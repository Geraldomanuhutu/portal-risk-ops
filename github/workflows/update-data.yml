name: Update Portal Data

on:
  push:
    paths:
      - 'Datamart_Risiko_Operasional.xlsx'  # hanya jalan kalau Excel diubah
  workflow_dispatch:                          # bisa juga dijalankan manual dari tab Actions

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Convert Excel → data.js
        run: python update_data.py

      - name: Commit & push data.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.js
          git diff --staged --quiet || git commit -m "auto: update data.js dari Excel [skip ci]"
          git push
